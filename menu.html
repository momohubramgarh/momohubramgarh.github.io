<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Momo Hub - The Official Scroll</title>
  <link rel="icon" type="image/svg+xml" href="/img/Logo.jpeg" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&family=Sniglet&display=swap" rel="stylesheet">

  <style>
    :root {
      --dough: #fffdf5;
      --sauce: #ff4500;
      --chutney: #ff8c00;
      --bamboo: #e3c08d;
      --bamboo-dark: #c19a6b;
      --dark-bg: #1a1a1a;
      --steam: rgba(255, 255, 255, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Fredoka', sans-serif;
      background-color: var(--dark-bg);
      background-image: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #1a1a1a 100%);
      color: var(--dough);
      overflow-x: hidden;
      display: flex; flex-direction: column; min-height: 100vh;
    }

    /* --- STEAM ANIMATION --- */
    .steam-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .steam-particle {
      position: absolute; bottom: -100px;
      background: radial-gradient(circle, var(--steam) 0%, transparent 70%);
      border-radius: 50%; opacity: 0;
      animation: rise 10s infinite ease-in;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      50% { transform: translateY(-50vh) scale(2); opacity: 0.3; }
      100% { transform: translateY(-100vh) scale(3); opacity: 0; }
    }

    /* --- HEADER --- */
    header {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 3px solid var(--sauce);
      padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand-logo img { height: 50px; }
    .home-btn {
      border: 2px solid var(--chutney); color: var(--chutney);
      padding: 8px 20px; border-radius: 50px; text-decoration: none;
      font-weight: bold; transition: 0.3s;
    }
    .home-btn:hover { background: var(--chutney); color: #fff; }

    /* --- PDF VIEWER CONTAINER --- */
    .menu-container {
      flex: 1;
      max-width: 1000px;
      width: 95%;
      margin: 40px auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-family: 'Sniglet', cursive;
      font-size: 3rem; color: var(--sauce);
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
    }
    
    p.subtitle { color: #ccc; margin-bottom: 30px; }

    /* The "Bamboo Board" Frame */
    .pdf-frame {
      background: #222;
      border: 10px solid var(--bamboo);
      border-radius: 15px;
      box-shadow: 
        inset 0 0 50px rgba(0,0,0,0.8), /* Inner shadow depth */
        0 20px 50px rgba(0,0,0,0.5);   /* Outer shadow drop */
      height: 80vh; /* Takes up 80% of screen height */
      overflow: hidden;
      position: relative;
    }

    /* Decorative Bamboo Lines on the border */
    .pdf-frame::before {
      content: ''; position: absolute; top: -10px; left: 20px; right: 20px; height: 10px;
      background: repeating-linear-gradient(90deg, var(--bamboo-dark) 0, var(--bamboo-dark) 2px, transparent 2px, transparent 20px);
      z-index: 5;
    }

    iframe {
      width: 100%; height: 100%; border: none;
    }

    /* --- DOWNLOAD BUTTON (Sauce Packet Style) --- */
    .download-section {
      margin-top: 30px;
      padding-bottom: 30px;
    }
    .download-btn {
      background: var(--sauce);
      color: white;
      text-decoration: none;
      padding: 15px 40px;
      border-radius: 5px 30px 5px 30px; /* Packet shape */
      font-weight: bold;
      font-size: 1.2rem;
      display: inline-flex; align-items: center; gap: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);
    }
    .download-btn:hover {
      transform: translateY(-5px) rotate(-2deg);
      box-shadow: 0 10px 25px rgba(255, 69, 0, 0.6);
      background: var(--chutney);
    }

    /* Footer */
    footer { text-align: center; padding: 20px; color: #555; position: relative; z-index: 2;}

  </style>
</head>
<body>

<div class="steam-container" id="steamArea"></div>

<header>
  <a href="index.html" class="brand-logo">
    <img src="/img/Logo.jpeg" alt="Momo Hub">
  </a>
  <a href="index.html" class="home-btn">← Back to Home</a>
</header>

<div class="menu-container">
  <h1>The Official Scroll 📜</h1>
  <p class="subtitle">View our full menu in high definition.</p>

  <div class="pdf-frame">
    <iframe src="/img/MomoHUb-Menu.pdf" title="Momo Hub Menu">
      <p style="color:white; padding:50px;">
        Your browser does not support PDFs. 
        <br>Please download the menu below.
      </p>
    </iframe>
  </div>

  <div class="download-section">
    <a href="/img/MomoHUb-Menu.pdf" download class="download-btn">
      📥 Download Menu PDF
    </a>
  </div>
</div>

<footer>
  <p>© 2025 Momo Hub. Prices subject to change (but the taste remains legendary).</p>
</footer>

<script>
  // Steam Generation
  window.addEventListener("load", () => {
    const container = document.getElementById('steamArea');
    for(let i=0; i<15; i++) {
      let span = document.createElement('span');
      span.className = 'steam-particle';
      span.style.left = Math.random() * 100 + '%';
      span.style.width = Math.random() * 100 + 50 + 'px';
      span.style.height = span.style.width;
      span.style.animationDelay = Math.random() * 5 + 's';
      span.style.animationDuration = Math.random() * 5 + 5 + 's';
      container.appendChild(span);
    }
  });
</script>

</body>
</html>
