<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Viewer</title>
    <style>
        /* Removes all margins and scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* Makes the image scale to fit the screen without cropping */
        #slideImage {
            width: 100vw;
            height: 100vh;
            object-fit: contain; 
            display: block; 
        }
    </style>
</head>
<body>

    <img id="slideImage" src="images/img1.jpeg" alt="Slideshow">

    <audio id="annoying-sound" loop>
        <source src="images/noise.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // Array holding the exact paths to your two images
        const imageList = [
            'images/img1.jpeg',
            'images/img2.jpeg'
        ];
        
        let currentIndex = 0;
        const slideImage = document.getElementById('slideImage');

        // 1. Start the 5-second switching loop immediately
        setInterval(() => {
            currentIndex = (currentIndex + 1) % imageList.length;
            slideImage.src = imageList[currentIndex];
        }, 5000);

        // 2. Play the sound exactly how it worked before (Triggers on first click)
        document.body.addEventListener('click', function() {
            document.getElementById('annoying-sound').play();
        }, { once: true }); // "once: true" means it only listens for this first click
    </script>

</body>
</html>
